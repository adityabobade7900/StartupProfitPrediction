<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Startup Profit Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #141927;
      --card:      #1a2235;
      --border:    #263050;
      --accent:    #00e5a0;
      --accent2:   #00b8ff;
      --warn:      #ff4f6e;
      --text:      #e8edf7;
      --muted:     #5c6a8a;
      --radius:    14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 16px 80px;
    }

    /* ---------- noise texture overlay ---------- */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ---------- glow blobs ---------- */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent);  top: -150px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; }

    /* ---------- header ---------- */
    header {
      position: relative; z-index: 1;
      text-align: center;
      margin-bottom: 48px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.25);
      color: var(--accent);
      font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 999px;
      margin-bottom: 18px;
    }
    .badge span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 64px);
      letter-spacing: .04em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--muted); font-size: 15px; margin-top: 10px; font-weight: 400;
    }

    /* ---------- card ---------- */
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 44px;
      width: 100%; max-width: 560px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }

    /* ---------- form ---------- */
    .form-group { margin-bottom: 24px; }
    label {
      display: block;
      font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap .unit {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 13px; pointer-events: none;
    }
    input, select {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 40px 12px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.12);
    }
    input::placeholder { color: var(--muted); }

    /* custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 14px;
    }
    select { padding-right: 36px; }
    select option { background: var(--surface); }

    /* ---------- row ---------- */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ---------- divider ---------- */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ---------- button ---------- */
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: .08em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0b0f1a;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }
    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,229,160,.35);
    }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"].loading { opacity: .7; pointer-events: none; }

    /* spinner inside button */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #0b0f1a;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- result ---------- */
    #result-box {
      margin-top: 28px;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    #result-box.show { display: block; animation: fadeUp .4s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .result-inner {
      background: linear-gradient(135deg, rgba(0,229,160,.08), rgba(0,184,255,.08));
      border: 1.5px solid rgba(0,229,160,.3);
      border-radius: 10px;
      padding: 24px 28px;
      display: flex; align-items: center; gap: 20px;
    }
    .result-icon {
      font-size: 36px; line-height: 1; flex-shrink: 0;
    }
    .result-label {
      font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 4px;
    }
    .result-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px; letter-spacing: .03em;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-inner.error {
      background: rgba(255,79,110,.07);
      border-color: rgba(255,79,110,.3);
    }
    .result-inner.error .result-label { color: var(--warn); }
    .result-inner.error .result-value {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      background: none; -webkit-text-fill-color: var(--text);
    }

    /* ---------- footer ---------- */
    footer {
      position: relative; z-index: 1;
      margin-top: 40px;
      color: var(--muted); font-size: 12px; text-align: center;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <header>
    <div class="badge"><span></span> AI-Powered Prediction</div>
    <h1>Startup Profit<br>Prediction System</h1>
    <p class="subtitle">Enter your spend allocation to forecast expected profit.</p>
  </header>

  <div class="card">
    <form id="predict-form" onsubmit="handleSubmit(event)">

      <div class="row">
        <div class="form-group">
          <label for="rd_spend">R&amp;D Spend</label>
          <div class="input-wrap">
            <input type="number" id="rd_spend" name="rd_spend" placeholder="e.g. 165349" step="any" required/>
            <span class="unit">$</span>
          </div>
        </div>
        <div class="form-group">
          <label for="administration">Administration</label>
          <div class="input-wrap">
            <input type="number" id="administration" name="administration" placeholder="e.g. 136898" step="any" required/>
            <span class="unit">$</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="marketing_spend">Marketing Spend</label>
        <div class="input-wrap">
          <input type="number" id="marketing_spend" name="marketing_spend" placeholder="e.g. 471784" step="any" required/>
          <span class="unit">$</span>
        </div>
      </div>

      <div class="form-group">
        <label for="state">State</label>
        <div class="select-wrap">
          <select id="state" name="state" required>
            <option value="California">California</option>
            <option value="Florida">Florida</option>
            <option value="New York">New York</option>
          </select>
        </div>
      </div>

      <hr class="divider"/>

      <button type="submit" id="submit-btn">
        <span id="btn-text">Predict Profit</span>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <div id="result-box">
      <div class="result-inner" id="result-inner">
        <div class="result-icon" id="result-icon">💰</div>
        <div>
          <div class="result-label" id="result-label">Predicted Profit</div>
          <div class="result-value" id="result-value">—</div>
        </div>
      </div>
    </div>
  </div>

  <footer>Built with Flask &amp; scikit-learn · Startup Profit Predictor</footer>

  <script>
    async function handleSubmit(e) {
      e.preventDefault();

      const btn    = document.getElementById('submit-btn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      const resultBox   = document.getElementById('result-box');
      const resultInner = document.getElementById('result-inner');
      const resultLabel = document.getElementById('result-label');
      const resultValue = document.getElementById('result-value');
      const resultIcon  = document.getElementById('result-icon');

      // Loading state
      btn.classList.add('loading');
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      resultBox.classList.remove('show');

      const payload = {
        rd_spend:       parseFloat(document.getElementById('rd_spend').value),
        administration: parseFloat(document.getElementById('administration').value),
        marketing_spend:parseFloat(document.getElementById('marketing_spend').value),
        state:          document.getElementById('state').value,
      };

      try {
        const resp = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();

        if (data.success) {
          resultInner.classList.remove('error');
          resultIcon.textContent  = '💰';
          resultLabel.textContent = 'Predicted Profit';
          resultValue.textContent = '$' + data.profit.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } else {
          resultInner.classList.add('error');
          resultIcon.textContent  = '⚠️';
          resultLabel.textContent = 'Prediction Error';
          resultValue.textContent = data.error || 'Something went wrong.';
        }
      } catch (err) {
        resultInner.classList.add('error');
        resultIcon.textContent  = '⚠️';
        resultLabel.textContent = 'Network Error';
        resultValue.textContent = 'Could not reach the server.';
      }

      // Reset button
      btn.classList.remove('loading');
      btnText.style.display = 'block';
      spinner.style.display = 'none';

      // Show result with animation
      resultBox.classList.add('show');
    }
  </script>
</body>
</html>
